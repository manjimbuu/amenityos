function useSort(defaultKey, defaultDir=1){
  const[sortKey,setSortKey]=useState(defaultKey);
  const[sortDir,setSortDir]=useState(defaultDir);
  const toggle=key=>{if(sortKey===key)setSortDir(d=>-d);else{setSortKey(key);setSortDir(1);}};
  const sort=arr=>[...arr].sort((a,b)=>{const av=a[sortKey]||"",bv=b[sortKey]||"";return typeof av==="number"?(av-bv)*sortDir:String(av).localeCompare(String(bv))*sortDir;});
  const Th=({k,l,style={}})=><th style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",...style}} onClick={()=>toggle(k)}>{l}{sortKey===k?<span style={{marginLeft:4,opacity:.7}}>{sortDir===1?"↑":"↓"}</span>:<span style={{marginLeft:4,opacity:.2}}>↕</span>}</th>;
  return{sort,Th,sortKey,sortDir};
}

function getRecOpts(dateStr){
  if(!dateStr)return[{v:"none",l:"Does not repeat"}];
  const d=new Date(dateStr+"T00:00:00");
  const dn=DFULL[d.getDay()],day=d.getDate(),mn=MONTHS[d.getMonth()];
  const wk=Math.ceil(day/7),isLast=new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-day<7;
  const wl=isLast?"last":WLBL[wk-1];
  return[{v:"none",l:"Does not repeat"},{v:"daily",l:"Daily"},{v:"weekly",l:"Weekly on "+dn},{v:"biweekly",l:"Every 2 weeks on "+dn},{v:"monthly_day",l:"Monthly on day "+day},{v:"monthly_week",l:"Monthly on the "+wl+" "+dn},{v:"annually",l:"Annually on "+mn+" "+day},{v:"weekdays",l:"Every weekday (Mon-Fri)"}];
}

function buildDates(start,rec,end){
  if(!rec||rec==="none")return[start];
  const dates=[],cur=new Date(start+"T00:00:00"),endD=new Date((end||start)+"T00:00:00");
  const sd=cur.getDay(),sdn=cur.getDate(),wkO=Math.ceil(sdn/7),isLast=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()-sdn<7;
  while(cur<=endD&&dates.length<104){
    dates.push(cur.toISOString().split("T")[0]);
    if(rec==="daily")cur.setDate(cur.getDate()+1);
    else if(rec==="weekly")cur.setDate(cur.getDate()+7);
    else if(rec==="biweekly")cur.setDate(cur.getDate()+14);
    else if(rec==="weekdays"){cur.setDate(cur.getDate()+1);while(cur.getDay()===0||cur.getDay()===6)cur.setDate(cur.getDate()+1);}
    else if(rec==="monthly_day"){cur.setMonth(cur.getMonth()+1);cur.setDate(sdn);}
    else if(rec==="monthly_week"){cur.setMonth(cur.getMonth()+1);if(isLast){const ld=new Date(cur.getFullYear(),cur.getMonth()+1,0);while(ld.getDay()!==sd)ld.setDate(ld.getDate()-1);cur.setDate(ld.getDate());}else{cur.setDate(1);let c=0;while(c<wkO){if(cur.getDay()===sd)c++;if(c<wkO)cur.setDate(cur.getDate()+1);}}}
    else if(rec==="annually")cur.setFullYear(cur.getFullYear()+1);
    else break;
  }
  return dates;
}

function detectConflicts(ev,allEvents,rooms,eventTypes){
  const conflicts=[];
  const room=rooms.find(r=>r.name===ev.room);
  const etype=eventTypes.find(t=>t.name===ev.type);
  const allowTimeOverlap=etype?.allow_time_overlap===true;
  if(room&&!ev.is_off_site){
    const sd=parseInt(room.spacing_days)||0;
    allEvents.filter(e=>e.status!=="cancelled"&&e.room===ev.room&&e.id!==ev.id).forEach(e=>{
      const diff=Math.abs((new Date(ev.date)-new Date(e.date))/86400000);
      if(e.date===ev.date){
        if(ev.start_time<e.end_time&&ev.end_time>e.start_time)conflicts.push({msg:"Room conflict: "+room.name+" is booked for \""+e.title+"\" ("+e.start_time+"-"+e.end_time+")"});
        else if(sd===1)conflicts.push({msg:room.name+" does not allow same-day bookings"});
      }else if(sd>1&&diff<sd)conflicts.push({msg:room.name+" needs "+sd+" days between events"});
    });
  }
  if(!allowTimeOverlap&&!ev.is_off_site){
    allEvents.filter(e=>{
      if(e.status==="cancelled"||e.id===ev.id||e.room===ev.room)return false;
      const ot=eventTypes.find(t=>t.name===e.type);
      return ot?.allow_time_overlap===false;
    }).forEach(e=>{
      if(e.date===ev.date&&ev.start_time<e.end_time&&ev.end_time>e.start_time)
        conflicts.push({msg:"Time conflict: \""+e.title+"\" ("+e.club+") is already at this time in "+e.room});
    });
  }
  if(etype&&(etype.spacing_days||0)>0){
    const sd=parseInt(etype.spacing_days);
    allEvents.filter(e=>e.status!=="cancelled"&&e.type===ev.type&&e.id!==ev.id).forEach(e=>{
      const diff=Math.abs((new Date(ev.date)-new Date(e.date))/86400000);
      if(diff<sd)conflicts.push({msg:"\""+etype.name+"\" events need "+sd+" days apart"});
    });
  }
  if(room&&room.capacity>0&&parseInt(ev.attendance)>room.capacity)
    conflicts.push({warning:true,msg:"Attendance ("+ev.attendance+") exceeds "+room.name+" capacity ("+room.capacity+")"});
  return conflicts;
}

function findAlt(ev,allEvents,rooms,eventTypes,n=3){
  const out=[];const c=new Date(ev.date+"T00:00:00");c.setDate(c.getDate()+1);let t=0;
  while(out.length<n&&t<120){const ds=c.toISOString().split("T")[0];if(detectConflicts({...ev,date:ds},allEvents,rooms,eventTypes).filter(x=>!x.warning).length===0)out.push(ds);c.setDate(c.getDate()+1);t++;}
  return out;
}

  while(cells.length%7!==0)cells.push(null);
  const approved=useMemo(()=>events.filter(e=>e.status==="approved"),[events]);
  const byDay=useMemo(()=>{const m={};approved.forEach(e=>{const d=new Date(e.date+"T00:00:00");if(d.getFullYear()===year&&d.getMonth()===month){const k=d.getDate();if(!m[k])m[k]=[];m[k].push(e);}});return m;},[approved,year,month]);
  const upcoming=approved.filter(e=>new Date(e.date+"T23:59:59")>=today).sort((a,b)=>a.date>b.date?1:-1);
  const{sort:sortUp,Th:ThUp}=useSort("date");
  const sortedUpcoming=sortUp(upcoming);
  const pM=()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1);
  const nM=()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1);
  return(
    <div className="fade">
      <div className="card" style={{padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={pM} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer"}}>{"<"}</button>
          <div style={{fontWeight:800,fontSize:"1rem",color:NAVY}}>{MONTHS[month]} {year}</div>
          <button onClick={nM} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer"}}>{">"}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {DAYS7.map(d=><div key={d} style={{textAlign:"center",fontSize:".65rem",fontWeight:700,color:"#9ca3af",padding:"3px 0"}}>{d}</div>)}
          {cells.map((day,i)=>{
            if(!day)return<div key={i} style={{minHeight:48}}/>;
            const isToday=day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
            const evs=byDay[day]||[];
            return(
              <div key={i} style={{borderRadius:6,padding:3,minHeight:48,border:isToday?"2px solid "+GOLD:"1px solid #f0f0f0",background:isToday?"#fffbeb":"#fff"}}>
                <div style={{fontSize:".68rem",fontWeight:isToday?800:500,color:isToday?GOLD:NAVY,textAlign:"right",paddingRight:2}}>{day}</div>
                {evs.slice(0,2).map(e=><div key={e.id} onClick={()=>onSelect(e)} title={e.title} style={{background:tColor(e.type,eventTypes),color:"#fff",borderRadius:3,padding:"1px 4px",fontSize:".55rem",fontWeight:600,marginTop:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{e.title}</div>)}
                {evs.length>2&&<div style={{fontSize:".55rem",color:"#9ca3af",textAlign:"center"}}>+{evs.length-2}</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div className="st">Upcoming Events</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div className="st" style={{margin:0}}>Upcoming Events</div>
        <div style={{display:"flex",gap:6}}>
          {[["date","Date"],["title","Title"],["club","Club"],["room","Room"]].map(([k,l])=>(
            <button key={k} onClick={()=>ThUp({k}).props.onClick()} style={{padding:"4px 10px",borderRadius:20,fontSize:".72rem",fontWeight:600,border:"none",cursor:"pointer",background:"#f3f4f6",color:"#374151"}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      {sortedUpcoming.length===0&&<div className="card" style={{padding:24,textAlign:"center",color:"#9ca3af"}}>No upcoming events scheduled.</div>}
      {sortedUpcoming.slice(0,10).map(e=>(
        <div key={e.id} className="card" style={{padding:12,marginBottom:8,cursor:"pointer",display:"flex",gap:10,alignItems:"center"}} onClick={()=>onSelect(e)}>
          <div style={{width:4,alignSelf:"stretch",borderRadius:4,background:tColor(e.type,eventTypes),flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,color:NAVY,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
            <div style={{fontSize:".74rem",color:"#6b7280"}}>{e.room} · {e.date} · {fmt12(e.start_time)}</div>
            <div style={{fontSize:".7rem",color:"#9ca3af"}}>{e.club}</div>
          </div>
          <span className="pill pg">Approved</span>
        </div>
      ))}
    </div>
  );
}

function SubmitEvent({user,events,rooms,eventTypes,addToast,onRefresh}){
  const blank={title:"",room:"",date:"",start_time:"",end_time:"",attendance:"",type:"",setup_style:"",notes:"",is_off_site:false,off_site_address:"",recurrence:"none",recurrence_end:""};
  const blankAV={mics:false,micCnt:1,screen:false,podium:false,podPos:"Center",t6:0,t8:0,tRound:0,chairsPer:8,tBanquet:0,extraChairs:0,avNotes:""};
  const[form,setForm]=useState({...blank});
  const[av,setAv]=useState({...blankAV});
  const[cf,setCf]=useState([]);
  const[alt,setAlt]=useState([]);
  const[loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const sa=(k,v)=>setAv(p=>({...p,[k]:v}));
  useEffect(()=>{
    if(form.room&&form.date&&form.start_time&&form.end_time&&form.type){
      const c=detectConflicts({...form,id:null},events,rooms,eventTypes);
      setCf(c);
      if(c.filter(x=>!x.warning).length>0)setAlt(findAlt({...form,id:null},events,rooms,eventTypes));
      else setAlt([]);
    }else{setCf([]);setAlt([]);}
  },[form.room,form.date,form.start_time,form.end_time,form.type]);
  const totalChairs=useMemo(()=>(av.tRound*av.chairsPer)+(av.tBanquet*10)+(av.t6*6)+(av.t8*8)+parseInt(av.extraChairs||0),[av]);
  const selRoom=rooms.find(r=>r.name===form.room);
  const blocking=cf.filter(c=>!c.warning);
  const warnings=cf.filter(c=>c.warning);

  const buildNotes=()=>{
    const lines=[];
    if(form.setup_style)lines.push("Setup: "+form.setup_style);
    if(av.mics)lines.push("Microphones: "+av.micCnt);
    if(av.podium)lines.push("Podium: "+av.podPos);
    if(av.screen)lines.push("Projector/Screen: Yes");
    if(av.t6>0)lines.push("6ft Tables: "+av.t6);
    if(av.t8>0)lines.push("8ft Tables: "+av.t8);
    if(av.tRound>0)lines.push("Round Tables: "+av.tRound+" ("+av.chairsPer+" chairs each)");
    if(av.tBanquet>0)lines.push("Banquet Tables: "+av.tBanquet);
    if(av.extraChairs>0)lines.push("Extra Chairs: "+av.extraChairs);
    if(totalChairs>0)lines.push("Total Chairs: "+totalChairs);
    if(av.avNotes)lines.push("A/V Notes: "+av.avNotes);
    return(form.notes||"")+(lines.length>0?"\n\n--- A/V & Equipment ---\n"+lines.join("\n"):"");
  };

  const submit=async()=>{
    if(!form.title||!form.date||!form.start_time||!form.end_time||!form.type)return addToast("Fill in all required fields","e");
    if(!form.is_off_site&&!form.room)return addToast("Please select a room","e");
    if(form.is_off_site&&!form.off_site_address.trim())return addToast("Please enter the venue address","e");
    if(blocking.length>0)return addToast("Resolve conflicts first","e");
    setLoading(true);
    const dates=buildDates(form.date,form.recurrence,form.recurrence_end);
    for(const d of dates){
      const c=detectConflicts({...form,date:d,id:null},events,rooms,eventTypes).filter(x=>!x.warning);
      if(c.length>0){setLoading(false);return addToast("Conflict on "+d+": "+c[0].msg,"e");}
    }
    let errs=0;
    for(const d of dates){
      const{error}=await sb.from("events").insert({title:form.title,room:form.is_off_site?"Off-Site":form.room,date:d,start_time:form.start_time,end_time:form.end_time,type:form.type,attendance:parseInt(form.attendance)||0,status:"approved",submitted_by:user.username||user.email||user.club,club:user.club,notes:buildNotes(),is_off_site:form.is_off_site,off_site_address:form.off_site_address||""});
      if(error)errs++;
    }
    setLoading(false);
    if(errs>0)return addToast(errs+" event(s) failed to save","e");
    addToast((dates.length>1?dates.length+" recurring events":"Event")+" submitted and approved!","s");
    setForm({...blank});setAv({...blankAV});onRefresh();
  };

  return(
    <div className="fade">
      <div className="st">Submit Event Request</div>
      <div className="card" style={{padding:20}}>
        <div className="fg">
          <div><label>Event Title *</label><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. Monthly Card Tournament"/></div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:"#f8faff",border:"1.5px solid #e0e7ff",borderRadius:10,padding:"10px 14px",fontWeight:600,fontSize:".875rem",color:NAVY}}>
            <input type="checkbox" style={{width:17,height:17,margin:0,accentColor:NAVY}} checked={form.is_off_site} onChange={e=>set("is_off_site",e.target.checked)}/>
            This is an Off-Site Event
          </label>
          {!form.is_off_site&&(
            <div>
              <label>Room *</label>
              <select value={form.room} onChange={e=>set("room",e.target.value)}>
                <option value="">Select a room...</option>
                {rooms.map(r=><option key={r.id} value={r.name}>{r.name}{r.capacity?" (max "+r.capacity+")":""}</option>)}
              </select>
              {selRoom&&selRoom.spacing_days>0&&<div style={{background:"#dbeafe",borderRadius:8,padding:"8px 12px",fontSize:".78rem",color:"#1e40af",marginTop:6}}>{selRoom.name} requires {selRoom.spacing_days===1?"no same-day bookings":selRoom.spacing_days+" days between events"}.</div>}
            </div>
          )}
          {form.is_off_site&&<div><label>Venue / Address *</label><input value={form.off_site_address} onChange={e=>set("off_site_address",e.target.value)} placeholder="Full address or venue name"/></div>}
          <div className="fr">
            <div><label>Date *</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div>
            <div><label>Event Type *</label>
              <select value={form.type} onChange={e=>set("type",e.target.value)}>
                <option value="">Select type...</option>
                {eventTypes.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
              </select>
            </div>
          </div>
          <div className="fr">
            <div><label>Start Time *</label><input type="time" value={form.start_time} onChange={e=>set("start_time",e.target.value)}/></div>
            <div><label>End Time *</label><input type="time" value={form.end_time} onChange={e=>set("end_time",e.target.value)}/></div>
          </div>
          <div className="fr">
            <div><label>Repeats</label>
              <select value={form.recurrence} onChange={e=>set("recurrence",e.target.value)}>
                {getRecOpts(form.date).map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
              </select>
            </div>
            {form.recurrence!=="none"&&<div><label>Repeat Until *</label><input type="date" value={form.recurrence_end} onChange={e=>set("recurrence_end",e.target.value)}/></div>}
          </div>
          {form.recurrence!=="none"&&form.date&&form.recurrence_end&&<div style={{background:"#f0f4ff",borderRadius:8,padding:"8px 12px",fontSize:".8rem",color:NAVY,fontWeight:600}}>This will create {buildDates(form.date,form.recurrence,form.recurrence_end).length} recurring events</div>}
          {!form.is_off_site&&<div className="fr">
            <div><label>Attendance</label><input type="number" value={form.attendance} onChange={e=>set("attendance",e.target.value)} min="1" placeholder="50"/></div>
            <div><label>Setup Style</label><select value={form.setup_style} onChange={e=>set("setup_style",e.target.value)}><option value="">Select...</option>{SETUPS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          </div>}
          {warnings.length>0&&<div style={{background:"#ffedd5",border:"1px solid #fed7aa",borderRadius:8,padding:"10px 14px"}}>{warnings.map((c,i)=><div key={i} style={{fontSize:".8rem",color:"#c2410c"}}>Warning: {c.msg}</div>)}</div>}
          {blocking.length>0&&(
            <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"12px 14px"}}>
              <div style={{fontWeight:700,fontSize:".82rem",color:"#991b1b",marginBottom:6}}>Conflicts - Cannot Submit</div>
              {blocking.map((c,i)=><div key={i} style={{fontSize:".78rem",color:"#991b1b",marginBottom:4}}>- {c.msg}</div>)}
              {alt.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #fca5a5"}}>
                <div style={{fontSize:".76rem",fontWeight:700,color:"#991b1b",marginBottom:6}}>Available dates:</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{alt.map(d=><button key={d} onClick={()=>set("date",d)} style={{background:"#fff",border:"1.5px solid #991b1b",color:"#991b1b",borderRadius:8,padding:"4px 10px",fontSize:".76rem",fontWeight:700,cursor:"pointer"}}>{d}</button>)}</div>
              </div>}
            </div>
          )}
          <div><label>Notes</label><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Any additional details..."/></div>
        </div>
        {!form.is_off_site&&(
          <div style={{marginTop:18,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
            <div style={{fontWeight:700,color:NAVY,marginBottom:12}}>A/V and Equipment Setup</div>
            <div className="fg">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["mics","Microphone"],["podium","Podium"],["screen","Projector/Screen"]].map(([k,l])=>(
                  <label key={k} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",background:"#f9fafb",border:"1.5px solid #e5e7eb",borderRadius:8,padding:"9px 10px",fontSize:".82rem",fontWeight:500}}>
                    <input type="checkbox" style={{width:15,height:15,margin:0,accentColor:NAVY}} checked={av[k]} onChange={e=>sa(k,e.target.checked)}/>{l}
                  </label>
                ))}
              </div>
              {av.mics&&<div className="fr"><div><label>Mic Count</label><input type="number" value={av.micCnt} onChange={e=>sa("micCnt",parseInt(e.target.value)||1)} min={1}/></div><div><label>Podium Position</label><select value={av.podPos} onChange={e=>sa("podPos",e.target.value)} disabled={!av.podium}><option>Left</option><option>Center</option><option>Right</option></select></div></div>}
              <div style={{fontWeight:600,fontSize:".8rem",color:NAVY}}>Tables and Seating</div>
              <div className="fr"><div><label>6ft Tables</label><input type="number" value={av.t6} onChange={e=>sa("t6",parseInt(e.target.value)||0)} min={0}/></div><div><label>8ft Tables</label><input type="number" value={av.t8} onChange={e=>sa("t8",parseInt(e.target.value)||0)} min={0}/></div></div>
              <div className="fr"><div><label>Round Tables</label><input type="number" value={av.tRound} onChange={e=>sa("tRound",parseInt(e.target.value)||0)} min={0}/></div><div><label>Chairs per Round</label><input type="number" value={av.chairsPer} onChange={e=>sa("chairsPer",parseInt(e.target.value)||8)} min={1} max={12}/></div></div>
              <div className="fr"><div><label>Banquet Tables</label><input type="number" value={av.tBanquet} onChange={e=>sa("tBanquet",parseInt(e.target.value)||0)} min={0}/></div><div><label>Extra Chairs</label><input type="number" value={av.extraChairs} onChange={e=>sa("extraChairs",parseInt(e.target.value)||0)} min={0}/></div></div>
              {totalChairs>0&&<div style={{background:"#f0f4ff",borderRadius:8,padding:"8px 12px",fontSize:".8rem",color:NAVY,fontWeight:600}}>Total chairs: {totalChairs}</div>}
              <div><label>A/V Notes</label><textarea value={av.avNotes} onChange={e=>sa("avNotes",e.target.value)} rows={2} placeholder="Any special requirements..."/></div>
            </div>
          </div>
        )}
        <button onClick={submit} disabled={loading||blocking.length>0} style={{marginTop:18,width:"100%",padding:"12px 0",fontSize:"1rem",fontWeight:700,borderRadius:10,background:blocking.length>0?"#9ca3af":NAVY,color:"#fff",border:"none",cursor:blocking.length>0?"not-allowed":"pointer"}}>
          {loading?<span className="sp"/>:blocking.length>0?"Resolve Conflicts First":"Submit Event Request"}
        </button>
      </div>
    </div>
  );
}

function Dashboard({events,eventTypes,rooms,clubUsers,onSelect,addToast,onRefresh}){
  const today=new Date(),todayStr=today.toISOString().split("T")[0];
  const pending=events.filter(e=>e.status==="pending");
  const upcoming=events.filter(e=>e.status==="approved"&&new Date(e.date+"T23:59:59")>=today).sort((a,b)=>a.date>b.date?1:-1);
  const todayEvs=events.filter(e=>e.status==="approved"&&e.date===todayStr).sort((a,b)=>a.start_time>b.start_time?1:-1);
  const pendingStaff=clubUsers.filter(u=>u.account_status==="pending");
  const[editEv,setEditEv]=useState(null);
  const[sel,setSel]=useState(new Set());
  const[search,setSearch]=useState("");

  const approve=async id=>{await sb.from("events").update({status:"approved"}).eq("id",id);addToast("Approved","s");onRefresh();};
  const reject=async id=>{await sb.from("events").update({status:"cancelled"}).eq("id",id);addToast("Declined","e");onRefresh();};
  const cancel=async id=>{if(!confirm("Cancel this event?"))return;await sb.from("events").update({status:"cancelled"}).eq("id",id);addToast("Cancelled","e");onRefresh();};
  const appStaff=async u=>{await sb.from("club_users").update({account_status:"active"}).eq("id",u.id);addToast(u.club+" approved","s");onRefresh();};
  const rejStaff=async u=>{await sb.from("club_users").update({account_status:"inactive"}).eq("id",u.id);addToast(u.club+" declined","e");onRefresh();};
  const saveEdit=async()=>{
    if(editEv._bulk){
      const upd={};if(editEv.room)upd.room=editEv.room;if(editEv.date)upd.date=editEv.date;if(editEv.start_time)upd.start_time=editEv.start_time;if(editEv.end_time)upd.end_time=editEv.end_time;if(editEv.status)upd.status=editEv.status;
      await Promise.all([...sel].map(id=>sb.from("events").update(upd).eq("id",id)));
      addToast("Updated "+sel.size+" events","s");setEditEv(null);setSel(new Set());
    }else{
      await sb.from("events").update({title:editEv.title,room:editEv.room,date:editEv.date,start_time:editEv.start_time,end_time:editEv.end_time,attendance:parseInt(editEv.attendance)||0,notes:editEv.notes,status:editEv.status}).eq("id",editEv.id);
      addToast("Updated","s");setEditEv(null);
    }
    onRefresh();
  };
  const bulkApprove=async()=>{await Promise.all([...sel].map(id=>sb.from("events").update({status:"approved"}).eq("id",id)));addToast("Approved "+sel.size+" events","s");setSel(new Set());onRefresh();};
  const bulkCancel=async()=>{if(!confirm("Cancel "+sel.size+" events?"))return;await Promise.all([...sel].map(id=>sb.from("events").update({status:"cancelled"}).eq("id",id)));addToast("Cancelled "+sel.size+" events","e");setSel(new Set());onRefresh();};
  const exportCSV=()=>{const h=["Title","Club","Room","Date","Start","End","Type","Attendance","Status"];const rows=events.map(e=>[e.title,e.club,e.room,e.date,e.start_time,e.end_time,e.type,e.attendance,e.status]);const csv=[h,...rows].map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="amenityos.csv";a.click();};

  const now=today.getHours()*60+today.getMinutes();
  const roomStatus=rooms.map(r=>{
    const bookedNow=todayEvs.find(e=>{if(e.room!==r.name)return false;const[sh,sm]=(e.start_time||"00:00").split(":").map(Number);const[eh,em]=(e.end_time||"00:00").split(":").map(Number);return now>=sh*60+sm&&now<eh*60+em;});
    const bookedToday=!bookedNow&&todayEvs.find(e=>e.room===r.name);
    return{r,bookedNow,bookedToday};
  });

  const{sort:sortWf,Th:ThWf}=useSort("date");
  const filtered=sortWf(upcoming.filter(e=>{if(!search)return true;const q=search.toLowerCase();return(e.title||"").toLowerCase().includes(q)||(e.club||"").toLowerCase().includes(q)||(e.room||"").toLowerCase().includes(q);}));

  const btn=(label,bg,color,onClick,style={})=><button onClick={onClick} style={{padding:"6px 14px",borderRadius:20,border:"none",background:bg,color,fontWeight:600,fontSize:".78rem",cursor:"pointer",...style}}>{label}</button>;

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:800,fontSize:"1.3rem",color:NAVY,letterSpacing:"-.01em"}}>Community Dashboard</div>
          <div style={{fontSize:".8rem",color:"#6b7280",marginTop:2}}>{today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
        </div>
        <div style={{display:"flex",gap:8}}>{btn("Print",GOLD,"#fff",()=>{})}{btn("Export CSV","#f3f4f6","#374151",exportCSV)}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
        {[["Today",todayEvs.length,"#3b82f6"],["Pending",pending.length+pendingStaff.length,"#f59e0b"],["Upcoming",upcoming.length,"#10b981"],["Total",events.length,"#8b5cf6"]].map(([l,n,c])=>(
          <div key={l} className="card" style={{padding:16,borderTop:"3px solid "+c}}>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:c,lineHeight:1}}>{n}</div>
            <div style={{fontSize:".72rem",color:"#6b7280",marginTop:4,fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>

      {(pending.length>0||pendingStaff.length>0)&&(
        <div style={{marginBottom:18}}>
          <div className="st">Needs Attention</div>
          {pendingStaff.map(u=>(
            <div key={u.id} className="card" style={{padding:12,marginBottom:8,display:"flex",alignItems:"center",gap:10,borderLeft:"3px solid #8b5cf6"}}>
              <div style={{width:34,height:34,borderRadius:10,background:"#ede9fe",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>👤</div>
              <div style={{flex:1}}><div style={{fontWeight:700,color:NAVY,fontSize:".88rem"}}>{u.club}</div><div style={{fontSize:".74rem",color:"#6b7280"}}>Account request · {u.type}</div></div>
              {btn("Decline","#f3f4f6","#374151",()=>rejStaff(u))}
              {btn("Approve",NAVY,"#fff",()=>appStaff(u))}
            </div>
          ))}
          {pending.map(e=>(
            <div key={e.id} className="card" style={{padding:12,marginBottom:8,display:"flex",alignItems:"center",gap:10,borderLeft:"3px solid #f59e0b"}}>
              <div style={{width:34,height:34,borderRadius:10,background:tColor(e.type,eventTypes),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:".68rem",fontWeight:800,flexShrink:0}}>{(e.type||"?").slice(0,2).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onSelect(e)}><div style={{fontWeight:700,color:NAVY,fontSize:".88rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div><div style={{fontSize:".74rem",color:"#6b7280"}}>{e.club} · {e.room} · {e.date} · {fmt12(e.start_time)}</div></div>
              {btn("Decline","#f3f4f6","#374151",()=>reject(e.id))}
              {btn("Approve",NAVY,"#fff",()=>approve(e.id))}
            </div>
          ))}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        <div className="card" style={{padding:18}}>
          <div style={{fontWeight:700,color:NAVY,marginBottom:12,fontSize:".9rem"}}>Today's Schedule</div>
          {todayEvs.length===0?<div style={{textAlign:"center",color:"#9ca3af",padding:"20px 0",fontSize:".85rem"}}>No events today</div>:
            todayEvs.map(e=>(
              <div key={e.id} onClick={()=>onSelect(e)} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:"1px solid #f3f4f6",cursor:"pointer"}}>
                <div style={{fontSize:".7rem",color:"#6b7280",minWidth:44,fontWeight:600,paddingTop:2}}>{fmt12(e.start_time)}</div>
                <div style={{width:3,alignSelf:"stretch",borderRadius:4,background:tColor(e.type,eventTypes),flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:NAVY,fontSize:".85rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div><div style={{fontSize:".72rem",color:"#6b7280"}}>{e.room}</div></div>
              </div>
            ))
          }
        </div>
        <div className="card" style={{padding:18}}>
          <div style={{fontWeight:700,color:NAVY,marginBottom:12,fontSize:".9rem"}}>Room Status</div>
          {roomStatus.slice(0,8).map(({r,bookedNow,bookedToday})=>{
            const status=bookedNow?"In Use":bookedToday?"Booked Today":"Available";
            const c=bookedNow?"#991b1b":bookedToday?"#92400e":"#065f46";
            const bg=bookedNow?"#fee2e2":bookedToday?"#fef3c7":"#d1fae5";
            return(
              <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div><div style={{fontWeight:700,color:NAVY,fontSize:".85rem"}}>{r.name}</div><div style={{fontSize:".7rem",color:"#6b7280"}}>{bookedNow?.title||bookedToday?.title||"Open"}</div></div>
                <span style={{fontSize:".7rem",padding:"3px 10px",borderRadius:20,background:bg,color:c,fontWeight:700,flexShrink:0}}>{status}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{padding:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div><div style={{fontWeight:700,color:NAVY,fontSize:".95rem"}}>Reservation Workflow</div><div style={{fontSize:".74rem",color:"#6b7280"}}>Manage and search all upcoming events</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{width:180,padding:"6px 12px",borderRadius:20,border:"1.5px solid #e5e7eb",fontSize:".8rem"}}/>
            {sel.size>0&&<>
              <span style={{background:NAVY,color:"#fff",borderRadius:20,padding:"4px 10px",fontSize:".74rem",fontWeight:700}}>{sel.size} selected</span>
              {btn("Approve","#d1fae5","#065f46",bulkApprove)}
              {btn("Edit Selected","#f0f4ff",NAVY,()=>setEditEv({...upcoming.find(e=>sel.has(e.id)),_bulk:true}))}
              {btn("Cancel","#fee2e2","#991b1b",bulkCancel)}
              {btn("Clear","#f3f4f6","#374151",()=>setSel(new Set()))}
            </>}
          </div>
        </div>
        {filtered.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#f8faff",borderRadius:8,marginBottom:8}}>
          <input type="checkbox" style={{width:14,height:14,accentColor:NAVY,cursor:"pointer"}} checked={sel.size===filtered.length&&filtered.length>0} onChange={e=>setSel(e.target.checked?new Set(filtered.map(x=>x.id)):new Set())}/>
          <span style={{fontSize:".74rem",fontWeight:600,color:NAVY}}>Select all {filtered.length}</span>
        </div>}
        <div className="tw">
          <table>
            <thead><tr><th style={{width:28}}></th><ThWf k="club" l="Club"/><ThWf k="title" l="Event"/><ThWf k="date" l="Date"/><ThWf k="room" l="Room"/><ThWf k="status" l="Status"/><th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:"#9ca3af",padding:20}}>No events found</td></tr>}
              {filtered.map(e=>{
                const isSel=sel.has(e.id);
                return(
                  <tr key={e.id} style={{background:isSel?"#f0f4ff":""}}>
                    <td><input type="checkbox" style={{width:14,height:14,accentColor:NAVY,cursor:"pointer"}} checked={isSel} onChange={ev=>{const s=new Set(sel);ev.target.checked?s.add(e.id):s.delete(e.id);setSel(s);}}/></td>
                    <td style={{fontWeight:600,fontSize:".82rem"}}>{e.club}</td>
                    <td><div style={{fontWeight:700,color:NAVY,fontSize:".85rem",cursor:"pointer",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} onClick={()=>onSelect(e)}>{e.title}</div><div style={{fontSize:".7rem",color:"#9ca3af"}}>{fmt12(e.start_time)}-{fmt12(e.end_time)}</div></td>
                    <td style={{fontSize:".82rem",whiteSpace:"nowrap"}}>{e.date}</td>
                    <td style={{fontSize:".82rem"}}>{e.room}</td>
                    <td><span style={{fontSize:".7rem",padding:"3px 9px",borderRadius:20,fontWeight:700,background:e.status==="approved"?"#d1fae5":e.status==="pending"?"#fef3c7":"#fee2e2",color:e.status==="approved"?"#065f46":e.status==="pending"?"#92400e":"#991b1b"}}>{e.status}</span></td>
                    <td><div style={{display:"flex",gap:5}}>{btn("Edit","#f3f4f6","#374151",()=>setEditEv({...e}))}{btn("Cancel","#fee2e2","#991b1b",()=>cancel(e.id))}</div></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editEv&&(
        <Overlay onClose={()=>setEditEv(null)} wide>
          <h3 style={{color:NAVY,fontWeight:800,marginBottom:4}}>{editEv._bulk?"Bulk Edit "+sel.size+" Events":"Edit Event"}</h3>
          {editEv._bulk&&<p style={{fontSize:".78rem",color:"#6b7280",marginBottom:14}}>Only filled fields will be updated.</p>}
          <div className="fg">
            {!editEv._bulk&&<div><label>Title</label><input value={editEv.title||""} onChange={e=>setEditEv(p=>({...p,title:e.target.value}))}/></div>}
            <div className="fr">
              <div><label>Room</label><select value={editEv.room||""} onChange={e=>setEditEv(p=>({...p,room:e.target.value}))}><option value="">{editEv._bulk?"Keep existing":""}</option>{rooms.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select></div>
              <div><label>Date</label><input type="date" value={editEv.date||""} onChange={e=>setEditEv(p=>({...p,date:e.target.value}))}/></div>
            </div>
            <div className="fr">
              <div><label>Start Time</label><input type="time" value={editEv.start_time||""} onChange={e=>setEditEv(p=>({...p,start_time:e.target.value}))}/></div>
              <div><label>End Time</label><input type="time" value={editEv.end_time||""} onChange={e=>setEditEv(p=>({...p,end_time:e.target.value}))}/></div>
            </div>
            {!editEv._bulk&&<div className="fr"><div><label>Attendance</label><input type="number" value={editEv.attendance||""} onChange={e=>setEditEv(p=>({...p,attendance:e.target.value}))}/></div><div><label>Status</label><select value={editEv.status||"approved"} onChange={e=>setEditEv(p=>({...p,status:e.target.value}))}><option value="approved">Approved</option><option value="pending">Pending</option><option value="cancelled">Cancelled</option></select></div></div>}
            {!editEv._bulk&&<div><label>Notes</label><textarea value={editEv.notes||""} onChange={e=>setEditEv(p=>({...p,notes:e.target.value}))} rows={2}/></div>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
            {btn("Cancel","#f3f4f6","#374151",()=>setEditEv(null))}
            {btn(editEv._bulk?"Update "+sel.size+" Events":"Save Changes",NAVY,"#fff",saveEdit)}
          </div>
        </Overlay>
      )}
    </div>
  );
}

function Settings({rooms,eventTypes,clubUsers,addToast,onRefresh}){
  const[tab,setTab]=useState("rooms");
  const[editRoom,setEditRoom]=useState(null);
  const[editType,setEditType]=useState(null);
  const[editUser,setEditUser]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const{sort:sortRooms,Th:ThR}=useSort("name");
  const{sort:sortTypes,Th:ThT}=useSort("name");
  const{sort:sortUsers,Th:ThU}=useSort("club");

  const saveRoom=async()=>{
    if(!editRoom.name)return addToast("Room name required","e");
    const p={name:editRoom.name,capacity:parseInt(editRoom.capacity)||0,spacing_days:parseInt(editRoom.spacing_days)||0};
    if(editRoom.isNew)await sb.from("rooms").insert({id:crypto.randomUUID(),...p});
    else await sb.from("rooms").update(p).eq("id",editRoom.id);
    addToast("Room saved","s");setEditRoom(null);onRefresh();
  };
  const delRoom=async id=>{await sb.from("rooms").delete().eq("id",id);addToast("Room deleted","e");setConfirmDel(null);onRefresh();};

  const saveType=async()=>{
    if(!editType.name)return addToast("Name required","e");
    const p={name:editType.name,color:editType.color||GOLD,spacing_days:parseInt(editType.spacing_days)||0,allow_time_overlap:editType.allow_time_overlap||false};
    if(editType.isNew)await sb.from("event_types").insert(p);
    else await sb.from("event_types").update(p).eq("id",editType.id);
    addToast("Event type saved","s");setEditType(null);onRefresh();
  };
  const delType=async id=>{await sb.from("event_types").delete().eq("id",id);addToast("Deleted","e");setConfirmDel(null);onRefresh();};

  const saveUser=async()=>{
    if(!editUser.club)return addToast("Club name required","e");
    if(editUser.isNew){
      const{error}=await sb.from("club_users").insert({id:crypto.randomUUID(),club:editUser.club,name:editUser.name||editUser.club,president:editUser.president||"",phone:editUser.phone||"",email:editUser.email||"",type:editUser.type||"club",role:"resident",account_status:"active",is_admin:false,meeting_schedule:editUser.meeting_schedule||"",meeting_room:editUser.meeting_room||"",username:(editUser.email||editUser.club).toLowerCase(),password:""});
      if(error)return addToast("Error: "+error.message,"e");
    }else{
      await sb.from("club_users").update({club:editUser.club,name:editUser.name||editUser.club,president:editUser.president||"",phone:editUser.phone||"",email:editUser.email||"",account_status:editUser.account_status,is_admin:editUser.is_admin,meeting_schedule:editUser.meeting_schedule||"",meeting_room:editUser.meeting_room||""}).eq("id",editUser.id);
    }
    addToast(editUser.isNew?"Club added":"Updated","s");setEditUser(null);onRefresh();
  };
  const deactivate=async id=>{await sb.from("club_users").update({account_status:"inactive"}).eq("id",id);addToast("Deactivated","e");setConfirmDel(null);onRefresh();};

  const tabBtn=(k,l)=><button key={k} onClick={()=>setTab(k)} style={{padding:"7px 16px",borderRadius:20,fontWeight:700,fontSize:".8rem",border:"none",cursor:"pointer",background:tab===k?NAVY:"#e5e7eb",color:tab===k?"#fff":NAVY}}>{l}</button>;
  const actBtn=(l,bg,color,onClick)=><button onClick={onClick} style={{padding:"4px 10px",borderRadius:20,border:"none",background:bg,color,fontWeight:600,fontSize:".74rem",cursor:"pointer"}}>{l}</button>;

  return(
    <div className="fade">
      <div className="st">Settings</div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["rooms","Rooms"],["types","Event Types"],["accounts","Accounts"],["general","General"]].map(([k,l])=>tabBtn(k,l))}
      </div>

      {tab==="rooms"&&(
        <div>
          <div className="card">
            <div className="tw"><table>
              <thead><tr><ThR k="name" l="Room"/><ThR k="capacity" l="Capacity"/><ThR k="spacing_days" l="Spacing"/><th>Actions</th></tr></thead>
              <tbody>{sortRooms(rooms).map(r=>(
                <tr key={r.id}>
                  <td style={{fontWeight:700,color:NAVY}}>{r.name}</td>
                  <td>{r.capacity?r.capacity+" people":"No limit"}</td>
                  <td><span className="pill pb">{SPACING.find(o=>o.v===parseInt(r.spacing_days))?.l||"No restriction"}</span></td>
                  <td><div style={{display:"flex",gap:5}}>{actBtn("Edit","#f3f4f6","#374151",()=>setEditRoom({...r,spacing_days:parseInt(r.spacing_days)||0}))}{actBtn("Delete","#fee2e2","#991b1b",()=>setConfirmDel({type:"room",id:r.id,name:r.name}))}</div></td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
          <button onClick={()=>setEditRoom({isNew:true,name:"",capacity:0,spacing_days:0})} style={{marginTop:10,padding:"7px 16px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,fontSize:".8rem",cursor:"pointer"}}>+ Add Room</button>
        </div>
      )}

      {tab==="types"&&(
        <div>
          <div className="card">
            <div className="tw"><table>
              <thead><tr><ThT k="name" l="Type"/><th>Color</th><ThT k="spacing_days" l="Same-Type Spacing"/><th>Can Overlap</th><th>Actions</th></tr></thead>
              <tbody>{sortTypes(eventTypes).map(t=>(
                <tr key={t.id}>
                  <td style={{fontWeight:700,color:NAVY}}>{t.name}</td>
                  <td><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:22,height:22,borderRadius:6,background:t.color||GOLD,border:"1px solid #e5e7eb"}}/><span style={{fontSize:".75rem",color:"#6b7280"}}>{t.color}</span></div></td>
                  <td><span className="pill pp">{SPACING.find(o=>o.v===parseInt(t.spacing_days||0))?.l||"No restriction"}</span></td>
                  <td><span className={"pill "+(t.allow_time_overlap?"pg":"pr")}>{t.allow_time_overlap?"Yes":"No"}</span></td>
                  <td><div style={{display:"flex",gap:5}}>{actBtn("Edit","#f3f4f6","#374151",()=>setEditType({...t,spacing_days:parseInt(t.spacing_days)||0,allow_time_overlap:t.allow_time_overlap||false}))}{actBtn("Delete","#fee2e2","#991b1b",()=>setConfirmDel({type:"type",id:t.id,name:t.name}))}</div></td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
          <button onClick={()=>setEditType({isNew:true,name:"",color:GOLD,spacing_days:0,allow_time_overlap:false})} style={{marginTop:10,padding:"7px 16px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,fontSize:".8rem",cursor:"pointer"}}>+ Add Event Type</button>
        </div>
      )}

      {tab==="accounts"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:".8rem",color:"#6b7280"}}>{clubUsers.length} accounts</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditUser({isNew:true,club:"",name:"",type:"committee",president:"",phone:"",email:"",meeting_schedule:"",meeting_room:"",account_status:"active",is_admin:false})} style={{padding:"7px 14px",borderRadius:20,background:"#ede9fe",color:"#5b21b6",border:"none",fontWeight:700,fontSize:".78rem",cursor:"pointer"}}>+ Add Committee</button>
              <button onClick={()=>setEditUser({isNew:true,club:"",name:"",type:"club",president:"",phone:"",email:"",meeting_schedule:"",meeting_room:"",account_status:"active",is_admin:false})} style={{padding:"7px 14px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,fontSize:".78rem",cursor:"pointer"}}>+ Add Club</button>
            </div>
          </div>
          <div className="card">
            <div className="tw"><table>
              <thead><tr><ThU k="club" l="Club / Account"/><ThU k="type" l="Type"/><ThU k="president" l="Contact"/><ThU k="email" l="Email"/><ThU k="account_status" l="Status"/><th>Actions</th></tr></thead>
              <tbody>{sortUsers(clubUsers).map(u=>(
                <tr key={u.id}>
                  <td style={{fontWeight:700,color:NAVY}}>{u.club}{(u.role==="director"||u.is_admin)&&<span style={{marginLeft:6,fontSize:".68rem",background:GOLD,color:"#fff",padding:"2px 6px",borderRadius:10,fontWeight:700}}>Admin</span>}</td>
                  <td><span className={"pill "+(u.type==="committee"?"pp":"pb")}>{u.type||u.role}</span></td>
                  <td style={{fontSize:".78rem",color:"#6b7280"}}>{u.president||"—"}</td>
                  <td style={{fontSize:".78rem",color:"#6b7280"}}>{u.email||"—"}</td>
                  <td><span className={"pill "+(u.account_status==="active"||!u.account_status?"pg":u.account_status==="pending"?"py":"pr")}>{u.account_status||"active"}</span></td>
                  <td><div style={{display:"flex",gap:5}}>
                    {actBtn("Edit","#f3f4f6","#374151",()=>setEditUser({...u}))}
                    {u.account_status==="pending"&&actBtn("Approve","#d1fae5","#065f46",async()=>{await sb.from("club_users").update({account_status:"active"}).eq("id",u.id);addToast("Approved","s");onRefresh();})}
                    {!u.is_admin&&actBtn("Remove","#fee2e2","#991b1b",()=>setConfirmDel({type:"user",id:u.id,name:u.club}))}
                  </div></td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
        </div>
      )}

      {tab==="general"&&(
        <div className="fg">
          <div className="card" style={{padding:18}}>
            <div style={{fontWeight:700,color:NAVY,marginBottom:12}}>Community Info</div>
            <div className="fg">
              <div><label>Community Name</label><input defaultValue="Valencia Isles" placeholder="Community name"/></div>
              <div><label>Director Email</label><input defaultValue={DIR_EMAIL} placeholder="director@email.com"/></div>
              <div style={{background:"#f0f4ff",borderRadius:8,padding:"10px 14px",fontSize:".78rem",color:NAVY}}>Contact support@myamenityos.com to update community settings.</div>
            </div>
          </div>
          <div className="card" style={{padding:18}}>
            <div style={{fontWeight:700,color:NAVY,marginBottom:12}}>Approval Rules</div>
            <div className="fg">
              {[["Auto-approve conflict-free events",true],["Email director on new submission",true],["Email club when approved",true]].map(([l,c])=>(
                <label key={l} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontWeight:500,fontSize:".85rem",color:"#374151"}}><input type="checkbox" defaultChecked={c} style={{width:15,height:15,accentColor:NAVY}}/>{l}</label>
              ))}
            </div>
          </div>
        </div>
      )}

      {editRoom&&<Overlay onClose={()=>setEditRoom(null)}>
        <h3 style={{color:NAVY,fontWeight:800,marginBottom:16}}>{editRoom.isNew?"Add Room":"Edit Room"}</h3>
        <div className="fg">
          <div><label>Room Name *</label><input value={editRoom.name} onChange={e=>setEditRoom(p=>({...p,name:e.target.value}))}/></div>
          <div><label>Max Capacity (0 = no limit)</label><input type="number" value={editRoom.capacity||0} onChange={e=>setEditRoom(p=>({...p,capacity:parseInt(e.target.value)||0}))}/></div>
          <div><label>Spacing Between Events</label><select value={editRoom.spacing_days||0} onChange={e=>setEditRoom(p=>({...p,spacing_days:parseInt(e.target.value)}))}>
            {SPACING.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select></div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={()=>setEditRoom(null)} style={{padding:"8px 18px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={saveRoom} style={{padding:"8px 18px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,cursor:"pointer"}}>Save Room</button>
        </div>
      </Overlay>}

      {editType&&<Overlay onClose={()=>setEditType(null)}>
        <h3 style={{color:NAVY,fontWeight:800,marginBottom:16}}>{editType.isNew?"Add Event Type":"Edit Event Type"}</h3>
        <div className="fg">
          <div><label>Type Name *</label><input value={editType.name} onChange={e=>setEditType(p=>({...p,name:e.target.value}))}/></div>
          <div><label>Color</label><div style={{display:"flex",alignItems:"center",gap:10}}><input type="color" value={editType.color||GOLD} onChange={e=>setEditType(p=>({...p,color:e.target.value}))} style={{width:46,height:38,padding:2,cursor:"pointer"}}/><span style={{fontSize:".8rem",color:"#6b7280"}}>{editType.color||GOLD}</span></div></div>
          <div><label>Min Days Between Same-Type Events</label><select value={editType.spacing_days||0} onChange={e=>setEditType(p=>({...p,spacing_days:parseInt(e.target.value)}))}>
            {SPACING.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select></div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:"#f9fafb",border:"1.5px solid #e5e7eb",borderRadius:8,padding:"10px 12px",fontWeight:500,fontSize:".85rem",color:"#374151"}}>
            <input type="checkbox" style={{width:15,height:15,accentColor:NAVY}} checked={editType.allow_time_overlap||false} onChange={e=>setEditType(p=>({...p,allow_time_overlap:e.target.checked}))}/>
            <div><div style={{fontWeight:600}}>Allow time overlaps</div><div style={{fontSize:".72rem",color:"#6b7280"}}>ON = committee style (only blocked by same room). OFF = club style (blocked if any event at same time).</div></div>
          </label>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={()=>setEditType(null)} style={{padding:"8px 18px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={saveType} style={{padding:"8px 18px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,cursor:"pointer"}}>Save</button>
        </div>
      </Overlay>}

      {editUser&&<Overlay onClose={()=>setEditUser(null)} wide>
        <h3 style={{color:NAVY,fontWeight:800,marginBottom:16}}>{editUser.isNew?(editUser.type==="committee"?"Add Committee":"Add Club"):"Edit — "+editUser.club}</h3>
        <div className="fg">
          <div className="fr">
            <div><label>Name *</label><input value={editUser.club||""} onChange={e=>setEditUser(p=>({...p,club:e.target.value}))}/></div>
            <div><label>Type</label><select value={editUser.type||"club"} onChange={e=>setEditUser(p=>({...p,type:e.target.value}))}><option value="club">Club</option><option value="committee">Committee</option><option value="management">Management</option><option value="staff">Staff</option></select></div>
          </div>
          <div className="fr">
            <div><label>President / Contact</label><input value={editUser.president||""} onChange={e=>setEditUser(p=>({...p,president:e.target.value}))}/></div>
            <div><label>Phone</label><input value={editUser.phone||""} onChange={e=>setEditUser(p=>({...p,phone:e.target.value}))}/></div>
          </div>
          <div><label>Email</label><input type="email" value={editUser.email||""} onChange={e=>setEditUser(p=>({...p,email:e.target.value}))}/></div>
          <div className="fr">
            <div><label>Meeting Schedule</label><input value={editUser.meeting_schedule||""} onChange={e=>setEditUser(p=>({...p,meeting_schedule:e.target.value}))} placeholder="e.g. 1st Tuesday, 10:00 AM"/></div>
            <div><label>Meeting Room</label><input value={editUser.meeting_room||""} onChange={e=>setEditUser(p=>({...p,meeting_room:e.target.value}))}/></div>
          </div>
          {!editUser.isNew&&<div className="fr">
            <div><label>Status</label><select value={editUser.account_status||"active"} onChange={e=>setEditUser(p=>({...p,account_status:e.target.value}))}><option value="active">Active</option><option value="pending">Pending</option><option value="inactive">Inactive</option></select></div>
            <div><label>Admin Access</label><select value={editUser.is_admin?"true":"false"} onChange={e=>setEditUser(p=>({...p,is_admin:e.target.value==="true"}))}><option value="false">No</option><option value="true">Yes - Full Admin</option></select></div>
          </div>}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={()=>setEditUser(null)} style={{padding:"8px 18px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={saveUser} style={{padding:"8px 18px",borderRadius:20,background:NAVY,color:"#fff",border:"none",fontWeight:700,cursor:"pointer"}}>{editUser.isNew?"Add "+editUser.type:"Save Changes"}</button>
        </div>
      </Overlay>}

      {confirmDel&&<Overlay onClose={()=>setConfirmDel(null)}>
        <div style={{textAlign:"center",padding:"8px 0"}}>
          <div style={{fontSize:"2rem",marginBottom:10}}>⚠️</div>
          <h3 style={{color:"#991b1b",fontWeight:800,marginBottom:8}}>{confirmDel.type==="user"?"Deactivate Account?":"Delete "+confirmDel.name+"?"}</h3>
          <p style={{fontSize:".85rem",color:"#6b7280",marginBottom:18}}>{confirmDel.type==="user"?confirmDel.name+" will not be able to log in.":"This cannot be undone."}</p>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={()=>setConfirmDel(null)} style={{padding:"8px 18px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>{if(confirmDel.type==="room")delRoom(confirmDel.id);else if(confirmDel.type==="type")delType(confirmDel.id);else deactivate(confirmDel.id);}} style={{padding:"8px 18px",borderRadius:20,background:"#fee2e2",color:"#991b1b",border:"none",fontWeight:700,cursor:"pointer"}}>{confirmDel.type==="user"?"Deactivate":"Delete"}</button>
          </div>
        </div>
      </Overlay>}
    </div>
  );
}

function EventModal({ev,isAdmin,onClose,onApprove,onCancel,eventTypes}){
  if(!ev)return null;
  const color=tColor(ev.type,eventTypes);
  const addGCal=()=>{const fmt=d=>d.replace(/-/g,"");const s=fmt(ev.date)+"T"+(ev.start_time||"00:00").replace(":","")+"00";const e2=fmt(ev.date)+"T"+(ev.end_time||"00:00").replace(":","")+"00";window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(ev.title)+"&dates="+s+"/"+e2+"&location="+encodeURIComponent(ev.room||""),"_blank");};
  return(
    <Overlay onClose={onClose}>
      <div style={{borderTop:"4px solid "+color,paddingTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div><div style={{fontWeight:800,fontSize:"1.1rem",color:NAVY}}>{ev.title}</div><div style={{fontSize:".78rem",color:"#6b7280",marginTop:2}}>{ev.club}</div></div>
          <span className={"pill "+(ev.status==="approved"?"pg":ev.status==="pending"?"py":"pr")}>{ev.status}</span>
        </div>
        <div style={{display:"grid",gap:8,fontSize:".85rem",marginBottom:16}}>
          {[["Location",ev.is_off_site?"Off-Site: "+(ev.off_site_address||""):ev.room],["Date",ev.date],["Time",fmt12(ev.start_time)+" - "+fmt12(ev.end_time)],["Type",ev.type||"N/A"],["Attendance",ev.attendance||"N/A"],["Notes",ev.notes||"None"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",gap:8}}><span style={{color:"#6b7280",minWidth:76,flexShrink:0}}>{l}:</span><span style={{fontWeight:600,color:NAVY,wordBreak:"break-word"}}>{v}</span></div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {ev.status==="approved"&&<button onClick={addGCal} style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,fontSize:".8rem",cursor:"pointer"}}>Add to Google Calendar</button>}
          {isAdmin&&ev.status==="pending"&&<><button onClick={()=>{onCancel(ev.id);onClose();}} style={{padding:"7px 14px",borderRadius:20,border:"none",background:"#fee2e2",color:"#991b1b",fontWeight:600,fontSize:".8rem",cursor:"pointer"}}>Decline</button><button onClick={()=>{onApprove(ev.id);onClose();}} style={{padding:"7px 14px",borderRadius:20,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:".8rem",cursor:"pointer"}}>Approve</button></>}
          {isAdmin&&ev.status==="approved"&&<button onClick={()=>{onCancel(ev.id);onClose();}} style={{padding:"7px 14px",borderRadius:20,border:"none",background:"#fee2e2",color:"#991b1b",fontWeight:600,fontSize:".8rem",cursor:"pointer"}}>Cancel Event</button>}
          <button onClick={onClose} style={{marginLeft:"auto",padding:"7px 14px",borderRadius:20,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontWeight:600,fontSize:".8rem",cursor:"pointer"}}>Close</button>
        </div>
      </div>
    </Overlay>
  );
}

function Loading(){
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d1b35,#1B3461)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <Logo size={56}/><div style={{color:"#fff",fontWeight:800,fontSize:"1.1rem"}}>AmenityOS</div>
      <div style={{width:32,height:32,border:"3px solid rgba(255,255,255,.2)",borderTopColor:GOLD,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[nav,setNav]=useState("calendar");
  const[sel,setSel]=useState(null);
  const{ts,add:addToast}=useToasts();
  const[events,setEvents]=useState([]);
  const[rooms,setRooms]=useState([]);
  const[eventTypes,setEventTypes]=useState([]);
  const[clubUsers,setClubUsers]=useState([]);

  const loadData=useCallback(async()=>{
    const[ev,rm,ty,cu]=await Promise.all([sb.from("events").select("*").order("date"),sb.from("rooms").select("*").order("name"),sb.from("event_types").select("*").order("name"),sb.from("club_users").select("*").order("club")]);
    if(ev.data)setEvents(ev.data);if(rm.data)setRooms(rm.data);if(ty.data)setEventTypes(ty.data);if(cu.data)setClubUsers(cu.data);
  },[]);

  useEffect(()=>{
    (async()=>{
      const{data:{session}}=await sb.auth.getSession();
      if(session?.user?.email){
        const{data:p}=await sb.from("club_users").select("*").eq("email",session.user.email.toLowerCase()).single();
        if(p&&(p.account_status==="active"||!p.account_status)){setUser({...p,session});await loadData();}
      }
      setLoading(false);
    })();
    const{data:{subscription}}=sb.auth.onAuthStateChange(ev=>{if(ev==="SIGNED_OUT"){setUser(null);setNav("calendar");}});
    return()=>subscription.unsubscribe();
  },[loadData]);

  const onAuth=async u=>{setUser(u);await loadData();setNav("calendar");};
  const onLogout=async()=>{await sb.auth.signOut();setUser(null);};
  const onRefresh=useCallback(async()=>{await loadData();},[loadData]);
  const approveEvent=async id=>{await sb.from("events").update({status:"approved"}).eq("id",id);addToast("Approved","s");onRefresh();};
  const cancelEvent=async id=>{await sb.from("events").update({status:"cancelled"}).eq("id",id);addToast("Cancelled","e");onRefresh();};
  const isAdmin=user?.role==="director"||user?.is_admin===true;

  if(loading)return<Loading/>;
  if(!user)return<AuthScreen onAuth={onAuth}/>;

  return(
    <div style={{minHeight:"100vh",background:"#EDF2F9"}}>
      <Toasts ts={ts}/>
      <Nav nav={nav} setNav={setNav} user={user} onLogout={onLogout}/>
      <div className="con">
        {nav==="calendar"&&<CalendarView events={events} eventTypes={eventTypes} onSelect={setSel}/>}
        {nav==="submit"&&<SubmitEvent user={user} events={events} rooms={rooms} eventTypes={eventTypes} addToast={addToast} onRefresh={onRefresh}/>}
        {nav==="myevents"&&!isAdmin&&<MyEvents user={user} events={events} eventTypes={eventTypes} onSelect={setSel}/>}
        {nav==="directory"&&<ClubDirectory clubUsers={clubUsers}/>}
        {nav==="dashboard"&&isAdmin&&<Dashboard events={events} eventTypes={eventTypes} rooms={rooms} clubUsers={clubUsers} onSelect={setSel} addToast={addToast} onRefresh={onRefresh}/>}
        {nav==="settings"&&isAdmin&&<Settings rooms={rooms} eventTypes={eventTypes} clubUsers={clubUsers} addToast={addToast} onRefresh={onRefresh}/>}
      </div>
      <EventModal ev={sel} isAdmin={isAdmin} onClose={()=>setSel(null)} onApprove={approveEvent} onCancel={cancelEvent} eventTypes={eventTypes}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
